<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#StopEbolaRDC - Générateur de Visuel</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pev-blue': '#1e3a8a',
                        'pev-orange': '#f97316',
                    }
                }
            }
        }
    </script>

    <!-- Bibliothèques React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }
        input[type="range"] {
            accent-color: #1e3a8a;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useRef, useEffect } = React;

        // Chemins vers vos images via GitHub Raw URLs
        const ASSETS = {
            logo: 'https://raw.githubusercontent.com/Obedmuhindo/lute-ebola-RDC-2026/main/Logo.png',
            filter: 'https://raw.githubusercontent.com/Obedmuhindo/lute-ebola-RDC-2026/main/Filtre.png'
        };

        // Composant Icône SVG simple pour éviter les conflits DOM
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/>,
                zoom: <React.Fragment><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></React.Fragment>,
                move: <React.Fragment><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/></React.Fragment>,
                rotate: <React.Fragment><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></React.Fragment>,
                image: <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></React.Fragment>,
                download: <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m7-10 5 5-5 5m5-5H3"/></React.Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const [userImage, setUserImage] = useState(null);
            const [zoom, setZoom] = useState(1);
            const [posX, setPosX] = useState(0);
            const [posY, setPosY] = useState(0);
            const [isExporting, setIsExporting] = useState(false);
            const [filterLoaded, setFilterLoaded] = useState(false);
            const [filterDataUrl, setFilterDataUrl] = useState(null); // Version convertie en base64 pour éviter tout souci CORS sur le canvas

            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);
            const previewRef = useRef(null);

            // Correction du scroll sur mobile : on attache l'événement touchmove de manière non-passive
            // pour pouvoir appeler preventDefault() seulement quand on glisse l'image.
            useEffect(() => {
                const preview = previewRef.current;
                if (!preview) return;

                const handleTouchMove = (e) => {
                    if (isDragging && userImage) {
                        // On empêche le scroll de la page seulement si on est en train de manipuler l'image
                        if (e.cancelable) e.preventDefault();
                    }
                };

                preview.addEventListener('touchmove', handleTouchMove, { passive: false });
                return () => preview.removeEventListener('touchmove', handleTouchMove);
            }, [isDragging, userImage]);

            useEffect(() => {
                const loadFilter = async () => {
                    try {
                        const url = ASSETS.filter + (ASSETS.filter.includes('?') ? '&' : '?') + "t=" + Date.now();
                        const response = await fetch(url, { mode: 'cors' });
                        if (!response.ok) throw new Error("HTTP error " + response.status);
                        const blob = await response.blob();
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            setFilterDataUrl(reader.result);
                            setFilterLoaded(true);
                        };
                        reader.readAsDataURL(blob);
                    } catch (error) {
                        console.error("Erreur de chargement CORS du filtre, fallback...", error);
                        const img = new Image();
                        img.crossOrigin = "anonymous";
                        img.src = ASSETS.filter;
                        img.onload = () => {
                            setFilterDataUrl(ASSETS.filter);
                            setFilterLoaded(true);
                        };
                        img.onerror = () => {
                            setFilterLoaded(false);
                        };
                    }
                };
                loadFilter();
            }, []);

            // Gestion du Drag & Drop sur l'image
            const handleStart = (e) => {
                if (!userImage) return;
                setIsDragging(true);
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                setDragStart({ x: clientX, y: clientY });
            };

            const handleMove = (e) => {
                if (!isDragging || !userImage) return;
                
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                
                const deltaX = clientX - dragStart.x;
                const deltaY = clientY - dragStart.y;

                // On ajuste le déplacement par le zoom pour que l'image suive exactement le doigt/souris
                setPosX(prev => prev + deltaX / zoom);
                setPosY(prev => prev + deltaY / zoom);
                setDragStart({ x: clientX, y: clientY });
            };

            const handleEnd = () => {
                setIsDragging(false);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setUserImage(event.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleDownload = async () => {
                if (!userImage || !canvasRef.current || !previewRef.current) return;
                setIsExporting(true);

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                canvas.width = 1080;
                canvas.height = 1080;

                try {
                    ctx.clearRect(0, 0, 1080, 1080);

                    const img = new Image();
                    img.src = userImage;
                    await new Promise((resolve) => (img.onload = resolve));

                    const previewWidth = previewRef.current.clientWidth || 400;
                    const scaleFactor = 1080 / previewWidth;

                    // On utilise les transformations du canvas pour matcher exactement le CSS
                    ctx.save();
                    
                    // 1. On se place au centre du canvas
                    ctx.translate(540, 540);
                    
                    // 2. On applique le zoom (scale)
                    ctx.scale(zoom, zoom);
                    
                    // 3. On applique le déplacement (translate) converti à l'échelle du canvas
                    ctx.translate(posX * scaleFactor, posY * scaleFactor);

                    // 4. On calcule la taille de base pour l'effet "object-cover"
                    const baseScale = Math.max(1080 / img.width, 1080 / img.height);
                    const drawWidth = img.width * baseScale;
                    const drawHeight = img.height * baseScale;
                    
                    // 5. On dessine l'image centrée (le scale et translate s'occupent du reste)
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                    
                    ctx.restore();

                    // Dessiner le filtre par-dessus
                    const filterImg = new Image();
                    filterImg.src = filterDataUrl || ASSETS.filter;
                    await new Promise((resolve) => {
                        filterImg.onload = resolve;
                        filterImg.onerror = () => resolve(null);
                    });

                    if (filterImg.complete && filterImg.naturalWidth > 0) {
                        ctx.drawImage(filterImg, 0, 0, 1080, 1080);
                    }

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    const link = document.createElement('a');
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.download = `StopEbolaRDC_${Date.now()}.jpg`;
                    link.href = dataUrl;
                    link.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(link);
                    }, 100);
                } catch (error) {
                    console.error("Erreur d'exportation:", error);
                    alert("Une erreur est survenue lors de la création de l'image.");
                } finally {
                    setIsExporting(false);
                }
            };

            const handleShare = async () => {
                if (!userImage || !canvasRef.current || !previewRef.current) {
                    alert("Veuillez d'abord ajouter votre photo.");
                    return;
                }

                const message = `Bonjour à toutes et à tous 🙌🏾

Face à l’épidémie d’Ebola en RDC, mobilisons-nous aux côtés du Ministère de la Santé et de l’Institut National de Santé Publique (INSP) pour limiter la propagation de cette maladie dans nos communautés.

Je viens de créer mon filtre d’engagement. Vous aussi, créez le vôtre et partagez-le pour sensibiliser votre entourage.

✅ Créez votre filtre d’engagement
✅ Partagez votre message de prévention
✅ Invitons chacun à protéger sa famille et sa communauté

Créez votre filtre ici :
https://bit.ly/filtre-cousp-ebola-RDC

#StopEbolaRDC
Prévenons. Protégeons. Agissons.`;

                setIsExporting(true);
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                canvas.width = 1080;
                canvas.height = 1080;

                try {
                    // Génération de l'image (même logique que download)
                    ctx.clearRect(0, 0, 1080, 1080);
                    const img = new Image();
                    img.src = userImage;
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = () => reject(new Error("Erreur de chargement de l'image utilisateur"));
                    });

                    const previewWidth = previewRef.current.clientWidth || 400;
                    const scaleFactor = 1080 / previewWidth;

                    ctx.save();
                    ctx.translate(540, 540);
                    ctx.scale(zoom, zoom);
                    ctx.translate(posX * scaleFactor, posY * scaleFactor);
                    const baseScale = Math.max(1080 / img.width, 1080 / img.height);
                    const drawWidth = img.width * baseScale;
                    const drawHeight = img.height * baseScale;
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();

                    const filterImg = new Image();
                    filterImg.src = filterDataUrl || ASSETS.filter;
                    await new Promise((resolve) => { filterImg.onload = resolve; filterImg.onerror = () => resolve(null); });
                    if (filterImg.complete && filterImg.naturalWidth > 0) {
                        ctx.drawImage(filterImg, 0, 0, 1080, 1080);
                    }

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

                    // Déclenchement du téléchargement automatique (comme le bouton télécharger)
                    const downloadLink = document.createElement('a');
                    downloadLink.style.display = 'none';
                    document.body.appendChild(downloadLink);
                    downloadLink.download = `StopEbolaRDC_${Date.now()}.jpg`;
                    downloadLink.href = dataUrl;
                    downloadLink.click();
                    
                    // On laisse un petit délai avant de retirer le lien pour certains navigateurs mobiles
                    setTimeout(() => {
                        document.body.removeChild(downloadLink);
                    }, 100);

                    const blob = await (await fetch(dataUrl)).blob();
                    const file = new File([blob], 'StopEbolaRDC.jpg', { type: 'image/jpeg' });

                    // Tentative de partage natif (Image + Texte)
                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            text: message,
                            title: '#StopEbolaRDC'
                        });
                    } else {
                        // Fallback WhatsApp texte seulement
                        const waUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
                        window.open(waUrl, '_blank');
                    }
                } catch (error) {
                    console.error("Erreur de partage:", error);
                    const waUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
                    window.open(waUrl, '_blank');
                } finally {
                    setIsExporting(false);
                }
            };

            const resetControls = () => {
                setZoom(1);
                setPosX(0);
                setPosY(0);
            };

            return (
                <div className="min-h-screen flex flex-col items-center bg-gray-50 pb-12">
                    <header className="w-full bg-white shadow-md py-6 px-4 flex flex-col items-center space-y-4 border-b-4 border-pev-blue relative overflow-hidden">
                        {/* Décorations subtiles en arrière-plan */}
                        <div className="absolute top-0 right-0 w-32 h-32 bg-pev-orange/5 rounded-full -mr-16 -mt-16"></div>
                        <div className="absolute bottom-0 left-0 w-24 h-24 bg-pev-blue/5 rounded-full -ml-12 -mb-12"></div>
                        
                        <img src={ASSETS.logo} alt="Logo" className="h-14 md:h-16 object-contain relative z-10" />
                        
                        <div className="text-center space-y-3 relative z-10 max-w-2xl">
                            <h1 className="text-xl md:text-2xl font-extrabold text-pev-blue uppercase tracking-tight leading-[1.1]">
                                Engageons-nous pour barrer la route à <br className="hidden md:block" />
                                l'épidémie d'<span className="text-pev-orange">Ebola</span> en RDC
                            </h1>
                            
                            <div className="inline-block bg-pev-blue/5 px-4 py-1.5 rounded-full border border-pev-blue/10">
                                <p className="text-[10px] md:text-xs text-pev-blue font-bold uppercase tracking-[0.2em]">
                                    Prévention & Sensibilisation • Juin 2026
                                </p>
                            </div>
                            
                            <p className="text-xs md:text-sm text-gray-500 font-medium italic">
                                "Générez votre filtre d'engagement et protégeons notre communauté"
                            </p>
                        </div>
                    </header>

                    <main className="w-full max-w-md px-4 mt-6 space-y-6">
                        <div 
                            ref={previewRef} 
                            className={`relative aspect-square w-full bg-white rounded-2xl shadow-2xl overflow-hidden border-4 border-white ${userImage ? 'cursor-grab active:cursor-grabbing' : ''}`}
                            onMouseDown={handleStart}
                            onMouseMove={handleMove}
                            onMouseUp={handleEnd}
                            onMouseLeave={handleEnd}
                            onTouchStart={handleStart}
                            onTouchMove={handleMove}
                            onTouchEnd={handleEnd}
                        >
                            <div className="absolute inset-0 z-0 flex items-center justify-center bg-gray-100">
                                {userImage ? (
                                    <div 
                                        className="w-full h-full flex items-center justify-center pointer-events-none select-none"
                                        style={{ 
                                            transform: `scale(${zoom}) translate(${posX}px, ${posY}px)`,
                                            transition: (isExporting || isDragging) ? 'none' : 'transform 0.1s ease-out'
                                        }}
                                    >
                                        <img src={userImage} alt="Aperçu" className="max-w-none min-w-full min-h-full object-cover" />
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center text-gray-400">
                                        <Icon name="upload" className="w-12 h-12 mb-2 opacity-20" />
                                        <p className="text-sm font-medium">Importez votre photo</p>
                                    </div>
                                )}
                            </div>

                            <div 
                                className="absolute inset-0 z-10 pointer-events-none"
                                style={{ 
                                    backgroundImage: `url(${filterDataUrl || ASSETS.filter})`, 
                                    backgroundSize: 'cover', 
                                    backgroundPosition: 'center' 
                                }}
                            >
                                {!filterLoaded && (
                                    <div className="absolute inset-0 flex items-center justify-center bg-white/80">
                                        <div className="w-12 h-12 border-4 border-pev-blue border-t-transparent rounded-full animate-spin"></div>
                                    </div>
                                )}
                            </div>
                            <canvas ref={canvasRef} className="hidden"></canvas>
                        </div>

                        <div className="bg-white rounded-2xl shadow-lg p-6 space-y-6 border border-gray-100">
                            <div className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <label className="text-xs font-bold text-pev-blue uppercase flex items-center">
                                        <Icon name="zoom" className="w-4 h-4 mr-2" /> Agrandissez votre photo
                                    </label>
                                    <span className="text-xs font-mono font-bold text-pev-blue">{Math.round(zoom * 100)}%</span>
                                </div>
                                <input 
                                    type="range" min="0.5" max="3" step="0.01" value={zoom} 
                                    onChange={(e) => setZoom(parseFloat(e.target.value))}
                                    className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                            </div>

                            <div className="space-y-4">
                                <label className="text-xs font-bold text-pev-blue uppercase flex items-center">
                                    <Icon name="move" className="w-4 h-4 mr-2" /> Déplacez votre photo à Gauche ou à Droite
                                </label>
                                <input 
                                    type="range" min="-500" max="500" step="1" value={posX} 
                                    onChange={(e) => setPosX(parseInt(e.target.value))}
                                    className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                            </div>

                            <div className="space-y-4">
                                <label className="text-xs font-bold text-pev-blue uppercase flex items-center">
                                    <Icon name="move" className="w-4 h-4 mr-2" /> Déplacez votre photo en Haut ou en Bas
                                </label>
                                <input 
                                    type="range" min="-500" max="500" step="1" value={posY} 
                                    onChange={(e) => setPosY(parseInt(e.target.value))}
                                    className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                            </div>

                            <div className="space-y-3 pt-2">
                                <div className="flex gap-3">
                                    <button onClick={resetControls} className="p-3 rounded-xl border-2 border-gray-200 text-gray-400 hover:bg-gray-50 transition-colors flex items-center justify-center" title="Réinitialiser">
                                        <Icon name="rotate" className="w-6 h-6" />
                                    </button>
                                    <button 
                                        onClick={() => fileInputRef.current.click()}
                                        className="flex-1 flex items-center justify-center gap-2 py-3 px-2 rounded-xl border-2 border-pev-blue text-pev-blue font-bold hover:bg-pev-blue/5 transition-all"
                                    >
                                        <Icon name="image" className="w-4 h-4 sm:w-5 sm:h-5" /> Ajouter votre photo
                                    </button>
                                </div>
                                
                                <button 
                                    onClick={handleDownload}
                                    disabled={!userImage || isExporting}
                                    className="w-full flex items-center justify-center gap-2 py-4 px-4 rounded-xl bg-pev-orange text-white font-bold shadow-lg shadow-pev-orange/30 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed transition-transform"
                                >
                                    {isExporting ? (
                                        <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                    ) : (
                                        <><Icon name="download" className="w-5 h-5" /> Télécharger mon visuel</>
                                    )}
                                </button>
                            </div>

                            {/* Bouton Partager sur WhatsApp */}
                            <button 
                                onClick={handleShare}
                                disabled={!userImage || isExporting}
                                className="w-full flex items-center justify-center gap-3 py-4 px-4 rounded-xl bg-[#25D366] text-white font-bold shadow-lg shadow-green-200 hover:scale-[1.01] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed transition-transform"
                            >
                                <svg className="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12.031 2a9.978 9.978 0 0 0-9.971 9.97c0 1.956.564 3.778 1.533 5.317L2 22l4.89-1.272A9.913 9.913 0 0 0 12.03 21a9.978 9.978 0 0 0 9.971-9.97A9.978 9.978 0 0 0 12.03 2zm-.029 1.688c4.549 0 8.245 3.696 8.245 8.282a8.216 8.216 0 0 1-8.245 8.281 8.255 8.255 0 0 1-4.223-1.16l-.303-.18-3.13.814.828-3.048-.198-.314a8.232 8.232 0 0 1-1.219-4.393c0-4.586 3.696-8.282 8.245-8.282zM8.342 6.777c-.161 0-.367.042-.544.207-.176.165-.676.66-.676 1.611 0 .95 1.01 1.87 1.151 2.057.142.186 1.942 3.125 4.814 4.254.683.268 1.217.428 1.631.543.687.21 1.312.18 1.805.111.55-.077 1.693-.681 1.93-1.338.236-.657.236-1.22.164-1.338-.071-.118-.268-.186-.56-.328-.291-.143-1.724-.836-1.99-.933-.266-.097-.46-.145-.658.144-.197.29-.763.933-.935 1.127-.172.193-.344.218-.636.075-.29-.143-1.23-.444-2.343-1.422-.866-.76-1.45-1.7-1.622-1.99-.172-.29-.018-.447.128-.59.13-.13.29-.338.437-.508.146-.17.195-.29.292-.483.097-.193.048-.363-.024-.508-.073-.145-.658-1.573-.902-2.153-.238-.567-.481-.49-.658-.499l-.56-.007z"/>
                                </svg>
                                Partager sur WhatsApp
                            </button>
                        </div>
                    </main>

                    <input ref={fileInputRef} type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />

                    <footer className="mt-8 text-center text-gray-400 text-xs px-6 max-w-md">
                        <p>Note : Pour un résultat optimal, utilisez une photo bien éclairée.</p>
                        <p className="mt-2">© 2026 Institut National de Santé Publique (INSP) - RDC</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
